version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: legacylink
      POSTGRES_PASSWORD: legacylink_secret
      POSTGRES_DB: legacylink
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U legacylink" ]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: [ "CMD-SHELL", "cat < /dev/tcp/localhost/6333 > /dev/null 2>&1 || exit 1" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://legacylink:legacylink_secret@postgres:5432/legacylink
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY:-demo_mode}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-demo_mode}
      REPLICATE_API_TOKEN: ${REPLICATE_API_TOKEN:-demo_mode}
      DEMO_MODE: ${DEMO_MODE:-true}
    depends_on:
      - postgres
      - qdrant
      - redis
    volumes:
      - ./demo:/app/demo
      - uploads_data:/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_DEMO_MODE: ${DEMO_MODE:-true}
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
  redis_data:
  uploads_data:
